<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nowtomation - Imagens Dinâmicas</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
      /* Reset geral para remover margens e paddings padrões */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f4f4f9;
    padding: 20px;
}

.container {
    padding-top: 20px;
    display: flex;
    gap: 30px;
    width: 100%;
    max-width: 1200px;
}

.left-panel {
    width: 50%;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.section {
    padding: 20px;
    border-radius: 10px;
    background: #fff;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
}

.section textarea{
    height: 200px;
}

.controls {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
}

input[type="text"], input[type="file"], textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

input[type="color"] {
    width: 100%;
    height: 20px;
    border: none;
    cursor: grab;
}

input[type="range"] {
    width: 100%;
}

.upload {
    display: block;
    padding-top: 10px;
    padding-bottom: 5px;
}

button {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    color: white;
    background: #32A6BD;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #2FC089;
}

#preview-container {
    display: flex;
    right: 45%;
    transform: translate(100%);
    justify-content: center;
    align-items: center;
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    position: absolute;
}

#preview {
    width: 350px;
    border-radius: 10px;
    position: relative;
    min-height: 350px;
    max-height: 800px;
    overflow: hidden;

}

#overlay, #textOverlay {
    position: absolute;
}
#clearStorage {
    position: fixed; 
    width: 270px; 
    bottom: 15px; 
    right: 15px; 
    padding: 10px 20px;     
    background: #32A6BD;            
    color: white; border: none; border-radius: 5px; cursor: pointer; z-index: 2000; }

#openModal:hover {
    background: #2FC089;
    
}

#clearStorage:hover {
    background: #2FC089;
    
}

.help-icon {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background-color: #32A6BD;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            line-height: 30px;
            border-radius: 50%;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s;
        }

        .help-icon:hover {
            background-color: #2FC089;
        }

        .help-icon::after {
            content: "API Documentação";
            position: absolute;
            top: 35px;
            right: 0;
            background-color: #32A6BD;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .help-icon:hover::after {
            opacity: 1;
        }
        </style>
</head>
<body>

    <a href="/Documentation" class="help-icon" target="_self">?</a>

    <button id="clearStorage">Limpar Armazenamento</button>

    <div class="container">
        <div class="left-panel">
           
            <div class="section">
                <label class="upload">Imagem Base:</label>
                <input type="file" id="baseImageInput" accept="image/*">
                <label class="upload">Imagem Sobreposta:</label>
                <input type="file" id="overlayImageInput" accept="image/*">
                <label class="upload">Texto:</label>
                <input type="text" id="textInput" placeholder="Digite seu texto">
            </div>
            
            <div class="section controls">
                <label>Tamanho: <br><input type="range" id="sizeRange" min="10" max="500" value="100"></label>
            
                <!-- Barras de controle para movimentação do texto -->
                <label>Posição X: <br><input type="range" id="posXRange" min="-350" max="350" value="0"></label>
                <label>Posição Y: <br><input type="range" id="posYRange" min="-800" max="800" value="0"></label>
            
                <label>Border Radius: <br><input type="range" id="borderRadiusRange" min="0" max="100" value="0"></label>
            
                <label>Cor do Texto: <br><input type="color" id="textColor"></label>
            
                <label>Tamanho do Texto: <br><input type="range" id="textSizeRange" min="5" max="100" value="20"></label>
            
                <!-- Barra de controle para a posição X do texto -->
                <label>Posição X Texto: <br><input type="range" id="textPosXRange" min="-350" max="350" value="0"></label>
            
                <!-- Barra de controle para a posição Y do texto -->
                <label>Posição Y Texto: <br><input type="range" id="textPosYRange" min="-800" max="800" value="0"></label>
            
                <label>Fonte:
                    <select id="fontFamily">
                        <option value="Arial">Arial</option>
                        <option value="Verdana">Verdana</option>
                        <option value="Times New Roman">Times New Roman</option>
                        <option value="Courier New">Courier New</option>
                        <option value="Georgia">Georgia</option>
                        <option value="Tahoma">Tahoma</option>
                        <option value="Comic Sans MS">Comic Sans MS</option>
                        <option value="Tahoma">Tahoma</option>
                        <option value="Trebuchet MS">Trebuchet MS</option>
                        <option value="Lucida Sans">Lucida Sans</option>
                    </select>
                </label>
            
                <label>Peso da Fonte:
                    <select id="fontWeight">
                        <option value="normal">Normal</option>
                        <option value="bold">Negrito</option>
                        <option value="lighter">Mais leve</option>
                        <option value="100">100</option>
                        <option value="300">300</option>
                        <option value="500">500</option>
                        <option value="700">700</option>
                        <option value="900">900</option>
                    </select>
                </label>
            
                <label>Alinhamento do Texto:
                    <select id="textAlign">
                        <option value="left">Esquerda</option>
                        <option value="center">Centralizado</option>
                        <option value="right">Direita</option>
                    </select>
                </label>
            
            </div>
            
            
            <div class="section">
                <button onclick="generateCurl()">Gerar cURL</button>
                <textarea id="curlCommand" readonly></textarea>
            
                <button onclick="copyCurl()">Copiar cURL</button>
            </div>
        </div>
    
        <div id="preview-container">
            <div id="preview"></div>
        </div>
    </div>

    <script>

fetch('/verifica-sessao')
    .then(res => res.json())
    .then(data => {
        if (!data.logado) {
            window.location.href = '/login'; // Se não estiver logado, redireciona
        }
    });


        let baseImageUrl = '';
        let overlayImageUrl = '';
        const API_TOKEN = 'natan1234564e56ty5h4wrth68eyh6nwsrthw445j65et564jnwrtj65eyt5m6erywr8t4ny65wr4t6h5w45'; // Substitua pelo token correto

        document.getElementById('baseImageInput').addEventListener('change', async function(event) {
            const file = event.target.files[0];
            if (file) {
                // Exibir preview imediatamente
                baseImageUrl = URL.createObjectURL(file);
                updatePreview();

                // Upload ao backend
                const formData = new FormData();
                formData.append('image', file);
                const response = await fetch('/upload-base', { method: 'POST', body: formData, headers: { 'Authorization': `Bearer ${API_TOKEN}` } });
                const data = await response.json();
                baseImageUrl = data.imageUrl; // Atualiza URL após o upload
                updatePreview();
            }
        });

        document.getElementById('overlayImageInput').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                overlayImageUrl = URL.createObjectURL(file);
                updatePreview();
            }
        });

        function updatePreview() {
    const preview = document.getElementById('preview');
    preview.innerHTML = ''; // Limpa a visualização a cada atualização

    // Exibe a imagem base, se disponível
    if (baseImageUrl) {
        const img = document.createElement('img');
        img.src = baseImageUrl;
        img.style.width = '350px';
        img.style.height = '100%';
        preview.appendChild(img);
    }

    // Exibe o overlay, se disponível
    if (overlayImageUrl) {
        const overlay = document.createElement('img');
        overlay.src = overlayImageUrl;
        overlay.id = 'overlay';
        overlay.style.width = document.getElementById('sizeRange').value + 'px';
        overlay.style.height = document.getElementById('sizeRange').value + 'px';
        overlay.style.position = 'absolute';
        overlay.style.top = document.getElementById('posYRange').value + 'px';
        overlay.style.left = document.getElementById('posXRange').value + 'px';
        overlay.style.borderRadius = document.getElementById('borderRadiusRange').value + '%';
        preview.appendChild(overlay);
    }

    // Exibe o texto, se houver
    const text = document.getElementById('textInput').value;
    if (text) {
        const textOverlay = document.createElement('div');
        textOverlay.id = 'textOverlay';
        textOverlay.textContent = text;

        // Estilo do texto com base nos parâmetros do usuário
        textOverlay.style.position = 'absolute';
        textOverlay.style.color = document.getElementById('textColor').value;
        textOverlay.style.fontSize = document.getElementById('textSizeRange').value + 'px';
        textOverlay.style.fontFamily = document.getElementById('fontFamily').value; // Adiciona a fonte
        textOverlay.style.fontWeight = document.getElementById('fontWeight').value; // Adiciona o peso
        textOverlay.style.textAlign = document.getElementById('textAlign').value; // Alinhamento
        textOverlay.style.left = document.getElementById('textPosXRange').value + 'px';
        textOverlay.style.top = document.getElementById('textPosYRange').value + 'px';

        preview.appendChild(textOverlay);
    }
}

// Adicionando os eventos para 'input' e 'change' em todos os controles
document.querySelectorAll('.controls input, .controls select').forEach(input => {
    input.addEventListener('input', updatePreview); // Para controles de 'input' como range e color
    input.addEventListener('change', updatePreview); // Para controles de 'select' como fonte, peso e alinhamento
});



function generateCurl() {
    const text = document.getElementById('textInput').value;
    const textColor = document.getElementById('textColor').value;
    const textSize = document.getElementById('textSizeRange').value;
    const textPosX = document.getElementById('textPosXRange').value;
    const textPosY = document.getElementById('textPosYRange').value;
    const overlaySize = document.getElementById('sizeRange').value;
    const overlayPosX = document.getElementById('posXRange').value;
    const overlayPosY = document.getElementById('posYRange').value;
    const borderRadius = document.getElementById('borderRadiusRange').value;

    // Novos parâmetros: Alinhamento, Peso e Fonte
    const fontFamily = document.getElementById('fontFamily').value;
    const fontWeight = document.getElementById('fontWeight').value;
    const textAlign = document.getElementById('textAlign').value;

    const curlCommand = `curl -X POST "${window.location.origin}/generate-image" -H "Content-Type: application/json" -H "Authorization: Bearer ${API_TOKEN}" -d '
{
"baseImage": "${baseImageUrl}",
"overlayImage": "<url da imagem de overlay aqui>",
"text": "${text}",
"textColor": "${textColor}",
"textSize": "${textSize}",
"textPosX": "${textPosX}",
"textPosY": "${textPosY}",
"fontFamily": "${fontFamily}",
"fontWeight": "${fontWeight}",
"textAlign": "${textAlign}",
"overlaySize": "${overlaySize}",
"overlayPosX": "${overlayPosX}",
"overlayPosY": "${overlayPosY}",
"overlayRadius": "${borderRadius}"
}'`;

    // Atualizando a caixa de texto com o comando cURL gerado
    document.getElementById('curlCommand').value = curlCommand;
}

function copyCurl() {
    const curlCommand = document.getElementById('curlCommand');
    curlCommand.select();
    curlCommand.setSelectionRange(0, 99999); // Para dispositivos móveis

    document.execCommand('copy');

    // Feedback ao usuário
    alert('Comando cURL copiado para a área de transferência!');
}

            document.getElementById("clearStorage").addEventListener("click", function() {
                if (confirm("Tem certeza que deseja apagar todas as imagens? Isso pode interromper automações.")) {
                    fetch("/clear-storage", { method: "DELETE", headers: { 'Authorization': `Bearer ${API_TOKEN}` } })
                        .then(res => res.json())
                        .then(data => alert(data.message))
                        .catch(() => alert("Erro ao limpar armazenamento!"));
                }
            });
    </script>
</body>
</html>
